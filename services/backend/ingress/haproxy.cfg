# SPDX-License-Identifier: Apache-2.0

global
    maxconn 32
    nbthread 1
    log stdout format raw local0

defaults
    log global
    mode http
    option dontlog-normal
    timeout connect 5s
    timeout client 5m
    timeout server 5m
    timeout client-fin 30s
    timeout server-fin 30s

resolvers docker
    nameserver docker 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s
    hold other 10s
    hold refused 10s
    hold nx 10s
    hold timeout 10s
    hold obsolete 10s

frontend tacua_loopback
    bind :8080
    acl tacua_backend_root path -i /healthz /version /v1
    acl tacua_backend_api path_beg -i /v1/
    use_backend tacua_backend if tacua_backend_root or tacua_backend_api
    default_backend tacua_reviewer

backend tacua_backend
    option httpchk GET /healthz
    http-check expect status 200
    server backend backend:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none

backend tacua_reviewer
    option httpchk GET /
    http-check expect status 200
    http-request del-header Authorization
    http-request del-header Cookie
    http-request del-header Idempotency-Key
    http-request del-header If-Match
    http-request del-header Proxy-Authorization
    http-request del-header Tacua-Content-Digest
    http-request del-header Tacua-Credential-ID
    http-request del-header Tacua-Evidence-Manifest-Digest
    http-request del-header Tacua-Intent-Digest
    http-request del-header Tacua-Page-Cursor
    http-request del-header Tacua-Protocol-Version
    http-request del-header Tacua-Requested-At
    http-request del-header Tacua-Scope-Digest
    http-request del-header Tacua-Sidecar-Digest
    http-request del-header Tailscale-User-Login
    http-request del-header Tailscale-User-Name
    http-request del-header Tailscale-User-Profile-Pic
    server reviewer reviewer:8081 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none
