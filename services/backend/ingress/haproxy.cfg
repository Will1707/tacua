# SPDX-License-Identifier: Apache-2.0

global
    maxconn 32
    nbthread 1
    log stdout format raw local0

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 5m
    timeout server 5m
    timeout client-fin 30s
    timeout server-fin 30s

resolvers docker
    nameserver docker 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s
    hold other 10s
    hold refused 10s
    hold nx 10s
    hold timeout 10s
    hold obsolete 10s

frontend tacua_loopback
    bind :8080
    default_backend tacua_backend

backend tacua_backend
    option tcp-check
    server backend backend:8080 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none
