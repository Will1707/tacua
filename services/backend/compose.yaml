services:
  backend:
    build:
      context: ../..
      dockerfile: services/backend/Dockerfile
    image: tacua-backend:local
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    pids_limit: 128
    deploy:
      replicas: 1
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - tacua-default-deny
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json,urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2)); assert d['status']=='ok' and d['retention_worker_running'] and d['pending_deletions']==0 and d['retention_last_failed_sessions']==0
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    volumes:
      - type: volume
        source: tacua-state
        target: /var/lib/tacua
      - type: bind
        source: ./local/config.json
        target: /run/tacua/config.json
        read_only: true
        bind:
          create_host_path: false
    secrets:
      - tacua_admin

  ingress:
    image: docker.io/library/haproxy:3.2.21-alpine3.24@sha256:66e25cc9a8332635f4e897f7f4b1e5622c25f09f0ee23cddc6ce9bdb3a24772a
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    pids_limit: 64
    deploy:
      replicas: 1
    read_only: true
    user: "99:99"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
        restart: true
    networks:
      - tacua-default-deny
      - tacua-loopback-publish
    configs:
      - source: tacua_loopback_ingress
        target: /usr/local/etc/haproxy/haproxy.cfg
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - CMD
        - sh
        - -ec
        - >-
          wget -qO- -T 2 http://127.0.0.1:8080/healthz | grep -q '"status":"ok"'
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  tacua_admin:
    file: ./local/admin-secret

configs:
  tacua_loopback_ingress:
    file: ./ingress/haproxy.cfg

volumes:
  tacua-state:

networks:
  tacua-default-deny:
    internal: true
  tacua-loopback-publish:
