# SPDX-License-Identifier: Apache-2.0

services:
  backend:
    build:
      context: ../..
      dockerfile: services/backend/Dockerfile
    image: tacua-pilot-backend:local
    restart: unless-stopped
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - tacua-state:/var/lib/tacua
      - ./local/config.json:/run/tacua/config.json:ro
    secrets:
      - tacua_admin

secrets:
  tacua_admin:
    file: ./local/admin-secret

volumes:
  tacua-state:
