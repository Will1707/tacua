# Optional production override. TACUA_BACKEND_IMAGE and TACUA_REVIEWER_IMAGE
# must be immutable image references such as
# registry.example/tacua@sha256:<64 lowercase hex characters>.

services:
  backend:
    image: ${TACUA_BACKEND_IMAGE:?set TACUA_BACKEND_IMAGE to an immutable digest-pinned image}
    build: !reset null
  reviewer:
    image: ${TACUA_REVIEWER_IMAGE:?set TACUA_REVIEWER_IMAGE to an immutable digest-pinned image}
    build: !reset null
