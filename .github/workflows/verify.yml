name: Verify

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  contracts-and-harnesses:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13.14'

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22.22.2'
          package-manager-cache: false

      - name: Validate release artifact input boundaries
        run: |
          node --test .github/scripts/check-markdown-links.test.mjs
          node --test .github/scripts/package-mobile-sdk.test.mjs
          node --test .github/scripts/validate-backend-image-inputs.test.mjs
          node --test .github/scripts/validate-mobile-sdk-release-run.test.mjs
          node --test .github/scripts/verify-backend-container.test.mjs
          node .github/scripts/check-markdown-links.mjs
          node .github/scripts/validate-backend-image-inputs.mjs

      - name: Validate approved-handoff candidate
        working-directory: contracts/approved-handoff
        run: |
          python3 -B scripts/handoff.py validate fixtures/positive/approved-handoff.json --markdown fixtures/positive/approved-handoff.md
          python3 -B scripts/handoff.py validate-executable-fixture
          python3 -B scripts/handoff.py verify fixtures/positive/approved-handoff.json fixtures/positive/approved-handoff.md
          python3 -B scripts/handoff.py validate-trial fixtures/positive/agent-trial.json fixtures/positive/approved-handoff.json fixtures/positive/approved-handoff.md --registry-assertion fixtures/positive/registry-assertion.json --registry-key-file fixtures/positive/registry-key.synthetic.hex --execution-assertion fixtures/positive/execution-assertion.json --execution-revocations fixtures/positive/execution-revocations.json --execution-key-file fixtures/positive/execution-key.synthetic.hex
          python3 -B -m unittest discover -s tests -v

      - name: Validate the V1 app-audio acceptance gate
        run: |
          python3 -B experiments/ios-capture-spike/scripts/validate_app_audio_acceptance.py experiments/ios-capture-spike/fixtures/app-audio-acceptance/synthetic-passing.json --conformance
          python3 -B -m unittest discover -s experiments/ios-capture-spike/tests -p 'test_app_audio_acceptance*.py' -v

      - name: Validate runtime contract candidates
        working-directory: contracts/runtime
        run: |
          python3 -B scripts/validate.py bundle fixtures/positive
          python3 -B -m unittest discover -s tests -v

      - name: Validate dormant local-processing contracts
        run: |
          python3 -B contracts/local-processing/scripts/regenerate_fixtures.py --check
          python3 -B contracts/local-processing/scripts/validate.py fixtures contracts/local-processing/fixtures
          PYTHONWARNINGS=error python3 -B -m unittest discover -s contracts/local-processing/tests -v

      - name: Validate production draft ticket-candidate contract
        working-directory: contracts/ticket-candidate
        run: |
          python3 -B scripts/ticket_candidate.py validate-chain fixtures/positive/version-1-draft.json fixtures/positive/version-2-needs-clarification.json fixtures/positive/version-3-ready.json fixtures/positive/version-4-approved.json
          python3 -B -m unittest discover -s tests -v

      - name: Validate the SDK/backend protocol
        working-directory: contracts/sdk-backend-protocol
        run: |
          python3 -B scripts/validate.py bundle fixtures/positive
          PYTHONWARNINGS=error python3 -B -m unittest discover -s tests -v

      - name: Validate the pilot backend boundary
        run: PYTHONWARNINGS=error python3 -B -m unittest discover -s services/backend/tests -v

      - name: Resolve and verify the isolated private-pilot processor profile
        env:
          TACUA_PROCESSOR_IMAGE: registry.invalid/tacua-processor@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          TACUA_PROCESSOR_MODEL_ID: synthetic-ci-model
          TACUA_PROCESSOR_EXECUTABLE: /opt/tacua/processor
        run: |
          docker compose -f services/backend/compose.processor.yaml --profile private-pilot config --format json > "$RUNNER_TEMP/tacua-processor-compose.json"
          python3 -B services/backend/scripts/verify_isolated_processor_profile.py "$RUNNER_TEMP/tacua-processor-compose.json"

      - name: Verify the sealed backend config example
        run: >-
          PYTHONPATH=services/backend/src python3 -B -m tacua_backend.config_tool
          services/backend/config.template.example.json
          --output services/backend/config.example.json --check

      - name: Validate synthetic evaluation harness
        working-directory: experiments/eval-harness
        run: |
          python3 -B src/validate_contracts.py
          python3 -B src/evaluate.py --corpus corpus/EVAL-001.v1.0.0.json --candidates fixtures/candidates/FIXED-SYNTHETIC-CANDIDATES.v1.0.0.json --compare fixtures/baselines/SYNTHETIC-BASELINE.v1.0.0.json
          python3 -B -m unittest discover -s tests -v

      - name: Validate synthetic security harness
        run: |
          node --check experiments/security-harness/src/harness.mjs
          node --check experiments/security-harness/scripts/run.mjs
          node --check experiments/security-harness/scripts/verify-artifacts.mjs
          node --test experiments/security-harness/test/harness.test.mjs
          node experiments/security-harness/scripts/run.mjs artifacts/security-harness/EXP-004
          node experiments/security-harness/scripts/verify-artifacts.mjs artifacts/security-harness/EXP-004

      - name: Type-check and bundle the reviewer app
        working-directory: apps/reviewer
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm test
          npm run typecheck
          ./node_modules/.bin/expo export --platform ios --output-dir /tmp/tacua-reviewer-export

      - name: Build and smoke-test the self-hosted backend image
        run: bash .github/scripts/verify-backend-container.sh

      - name: Ensure verification artifacts are reproducible
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

  ios-capture-boundary:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Require the Xcode 26.3 toolchain
        run: |
          set -euo pipefail
          expected_xcode="$(printf 'Xcode 26.3\nBuild version 17C529')"
          test "$(xcodebuild -version)" = "$expected_xcode"
          xcrun swiftc --version | grep -Eq 'Apple Swift version 6\.2([. ]|$)'

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22.22.2'
          package-manager-cache: false

      - name: Install physical-device harness dependencies
        working-directory: experiments/ios-capture-spike/harness
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run SDK core and harness type checks
        working-directory: experiments/ios-capture-spike/package
        run: sh tests/run-core-tests.sh

      - name: Verify the SDK release-package boundary and reproducibility
        run: |
          sdk_version="$(node -p "require('./experiments/ios-capture-spike/package/package.json').version")"
          node .github/scripts/package-mobile-sdk.mjs \
            --tag "mobile-sdk-v${sdk_version}" \
            --out-dir "$RUNNER_TEMP/tacua-mobile-sdk-verification" \
            > "$RUNNER_TEMP/tacua-mobile-sdk-verification.json"

      - name: Compile the SDK through a generated Expo iOS project
        working-directory: experiments/ios-capture-spike/harness
        run: |
          ./node_modules/.bin/expo prebuild --platform ios --no-install
          cd ios
          pod install
          xcodebuild -quiet \
            -workspace TacuaCaptureLab.xcworkspace \
            -scheme TacuaCaptureLab \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Compile the ReplayKit API boundary
        run: |
          xcrun swiftc -typecheck \
            -module-cache-path "$RUNNER_TEMP/tacua-replaykit-module-cache" \
            -target arm64-apple-ios17.0 \
            -sdk "$(xcrun --sdk iphoneos --show-sdk-path)" \
            experiments/ios-capture-api-probe/CaptureAPIProbe.swift
